server:
  port: 8080

spring:
  datasource:
    url: ${DBMS_CONNECTION:jdbc:postgresql://localhost:5432/test}
    driverClassName: org.postgresql.Driver
    username: ${DBMS_USERNAME:test}
    password: ${DBMS_PASSWORD:test}
    hikari:
      maximum-pool-size: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:test@gmail.com}
    password: ${MAIL_PASSWORD:test-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:test-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:test-google-client-secret}
            scope:
              - email
              - profile

jwt:
  signerKey: ${JWT_SIGNER_KEY:test-jwt-secret}
  valid-duration: 3600
  refreshable-duration: 36000

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin123}

frontend:
  url: ${FE_URL:http://localhost:3000}
  accept_prescription_endpoint: ${ACCEPT_PRESCRIPTION_ENDPOINT:/accept-prescription}

cloudinary:
  name: ${CLOUDINARY_CLOUD_NAME:test-cloud}
  apiKey: ${CLOUDINARY_API_KEY:test-key}
  apiSecret: ${CLOUDINARY_API_SECRET:test-secret}

google:
  api:
    key: ${GOOGLE_API_KEY:test-google-api-key}
    model: gemini-2.5-flash